# Domain: Gaming Platforms and Interactive Service
# Problem Statement: Player Community, Moderation and Engagement Platform
# Last Updated: 2026-02-03

DomainTerm1: Gamer
definition:
  An individual who participates in gaming communities to interact,
  communicate, and engage with other gamers or creators on the platform.
examples:
  - A gamer chatting in a community channel.
  - A gamer joining a server to discuss a multiplayer game.
aliases:
  - Player
  - Member

DomainTerm2: Audience
definition:
  Individuals who follow or observe a content creator or community primarily
  for viewing, listening, or passive participation, with limited or optional
  interaction compared to active gamers.
examples:
  - Viewers watching a creator’s updates or announcements.
  - Audience members reacting or commenting during community events.
aliases:
  - Viewers
  - Spectators

DomainTerm3: Community
definition:
  A collective of gamers and audience members organized around shared
  interests, games, or creators to enable structured interaction.
examples:
  - A community built around a popular game.
  - A creator-led fan community.
aliases:
  - Group
  - Guild

DomainTerm4: Channel
definition:
  A dedicated communication space within a community used for discussions,
  announcements, or specific activities.
examples:
  - A channel for gameplay discussion.
  - A channel used for community announcements.
aliases:
  - Room
  - Section

DomainTerm5: Role
definition:
  A predefined set of permissions and responsibilities assigned to a user
  within a community or channel.
examples:
  - Assigning a moderator role to a gamer.
  - Granting read-only access to an audience member.
aliases:
  - User Role
  - Permission Set

DomainTerm6: Community Manager
definition:
  A strategic role responsible for overseeing a group of related
  channels, analyzing community health metrics, creating official
  channels.
examples:
  - A community manager analyzing engagement metrics across multiple game channels.
  - A community manager creating an official tournament channel and setting its guidelines.
aliases:
  - Community Lead
  - Senior Moderator
  - Group Manager

DomainTerm7: System Moderator
definition:
  A platform-level authority responsible for overseeing multiple
  communities, handling cross-channel disputes, and supervising Community Managers.
examples:
  - A system moderator reviewing a user's behavior across different gaming communities.
  - A system moderator developing platform-wide moderation policies.
  - A system moderator conducting training for community managers.
aliases:
  - Platform Moderator
  - Global Moderator
  - Senior Community Manager

DomainTerm8: Moderation Action
definition:
  An action taken to enforce community guidelines and ensure respectful
  behavior within channels and communities.
examples:
  - Issuing a warning for inappropriate language.
  - Temporarily banning a gamer from a channel.
aliases:
  - Warning
  - Restriction

DomainTerm9: Report
definition:
  A request raised by a gamer or audience member to flag inappropriate
  behavior or content for review.
examples:
  - Reporting harassment in a channel.
  - Flagging offensive content posted by a gamer.
aliases:
  - Complaint
  - Flag

DomainTerm10: Appeal
definition:
  A request submitted to review or reconsider a moderation action
  taken against a gamer.
examples:
  - Appealing a temporary mute.
  - Requesting review of a ban decision.
aliases:
  - Review Request

DomainTerm11: Guest User
definition:
  An unregistered or unauthenticated user who can browse public
  communities and channels in read-only mode before joining or registering.
examples:
  - A guest user viewing public community announcements.
  - A guest user browsing channels before creating an account.
aliases:
  - Visitor
  - Anonymous User

DomainTerm12: System Administrator
definition:
  The highest-level technical authority responsible for platform-wide
  configuration, infrastructure management, automated moderation setup,
  and final decision-making on escalated cases.
examples:
  - A system administrator configuring global moderation policies.
  - A system administrator issuing a permanent platform-wide ban.
aliases:
  - Platform Admin
  - Super Administrator

DomainTerm13: System Bot
definition:
  An automated system component responsible for monitoring content,
  detecting policy violations, filtering spam, and assisting human moderators
  in real time.
examples:
  - A system bot auto-filtering toxic language.
  - A system bot flagging suspicious user behavior.
aliases:
  - Moderation Bot
  - Automation Agent

DomainTerm14: Community Event
definition:
  A scheduled or live activity hosted within a community to encourage
  interaction, engagement, and participation among gamers and audience members.
examples:
  - A community-hosted multiplayer tournament.
  - A live Q&A session with a creator.
aliases:
  - Event
  - Live Session

DomainTerm15: Community Guidelines
definition:
  A defined set of rules and behavioral standards that govern acceptable
  conduct within communities and channels.
examples:
  - Guidelines prohibiting harassment and hate speech.
  - Rules defining acceptable language usage.
aliases:
  - Code of Conduct
  - Community Rules

DomainTerm16: Engagement Metric
definition:
  A measurable indicator used to assess user participation, interaction
  levels, and overall community health.
examples:
  - Daily active users in a community.
  - Message frequency per channel.
aliases:
  - Engagement KPI
  - Activity Metric

DomainTerm17: Sanction
definition:
  A penalty imposed on a user for violating community guidelines, ranging
  from temporary restrictions to permanent removal.
examples:
  - Temporarily muting a gamer for spamming.
  - Permanently banning a repeat offender.
aliases:
  - Penalty
  - Punishment

DomainTerm18: Escalation
definition:
  The process of forwarding a moderation issue to a higher authority
  when it exceeds the decision-making scope of the current role.
examples:
  - A system moderator escalating a severe harassment case.
  - A moderator forwarding a case to a system administrator.
aliases:
  - Case Escalation
  - Issue Handoff

DomainTerm19: Audit Log
definition:
  A secure record that stores all moderation actions, reports, and
  administrative decisions for transparency and accountability.
examples:
  - Reviewing logs of deleted messages.
  - Auditing ban history during an appeal review.
aliases:
  - Activity Log
  - Moderation Log

DomainTerm20: Community Health
definition:
  An overall assessment of a community’s quality based on engagement,
  behavioral trends, report frequency, and user retention.
examples:
  - Evaluating toxicity levels in a gaming community.
  - Measuring retention after moderation changes.
aliases:
  - Community Well-being
  - Platform Health

  
